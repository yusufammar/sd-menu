<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Shajarat Al-Durr - Menu KSA</title>
  <link rel="icon" type="image/x-icon" href="/images/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

  <!-- Top Toolbar -->
  <div class="toolbar">
    <button class="lang-btn active" id="btn-en">English</button>

    <div class="logo">
      <img src="images/logo.png" height="80">
    </div>

    <button class="lang-btn" id="btn-ar">عربي</button>
  </div>

  <!-- Main Categories -->
  <div class="category-slider" id="categorySlider"></div>

  <!-- Main Layout -->
  <div class="content-wrapper" id="contentWrapper">
    <div class="sub-category-bar" id="subCategoryBar"></div>
    <div class="menu-container" id="menuContainer"></div>
  </div>

  <script src="script.js"></script>
</body>

</html>
